# /etc/logrotate.d/nexus-audit — v1.3 audit log rotation.
#
# Pairs with the daily nexus-a2a-audit-verify cron (see
# docs/deployment/operations.md § Audit log retention).
#
# Design notes:
#   - v1.3 introduces FileSink::reopen() + SIGHUP handler (Phase 1.3.5).
#     We now use the default move-and-create rotation strategy; the
#     postrotate hook sends SIGHUP so nexus-server reopens the fresh
#     file. The chain-head recalculation in `open_inner` correctly
#     resets prev_hash when the new file is empty.
#   - prerotate runs the integrity verifier on the LIVE file before
#     it gets rotated. A non-zero exit aborts the rotation, so a
#     tampered file is preserved in place for forensics.

/var/lib/nexus/audit.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0600 nexus nexus

    prerotate
        /usr/local/bin/nexus-a2a-audit-verify /var/lib/nexus/audit.log \
            || { logger -t nexus-audit -p user.crit \
                    "audit log TAMPER detected — refusing to rotate"; exit 1; }
    endscript

    postrotate
        # v1.3: notify nexus-server to reopen its FileSink + reload the
        # capability matrix (same SIGHUP handler covers both).
        systemctl reload nexus-server >/dev/null 2>&1 || true
    endscript
}
