[build]
target = "index.html"
dist = "dist"
release = false

[watch]
ignore = ["node_modules", "dist", ".trunk"]

[serve]
address = "127.0.0.1"
port = 1420
open = false

# xterm.js vendoring (v1.0 D-V1-F carry-over) — Trunk pre-build hook.
[[hooks]]
stage = "pre_build"
command = "sh"
command_arguments = ["-c", "npm install --silent && npm run build-xterm"]
