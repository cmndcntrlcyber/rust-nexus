[build]
target = "index.html"
dist = "dist"
release = false

[watch]
ignore = ["node_modules", "dist", ".trunk"]

[serve]
address = "127.0.0.1"
port = 1420
open = false

# xterm.js vendor files are in ui/vendor/ and copied by Trunk's copy-dir pipeline.
# To update: cd nexus-console/ui && npm install && npm run build-xterm-src
