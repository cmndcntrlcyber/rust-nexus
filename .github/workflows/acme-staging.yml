name: ACME staging round-trip

# v1.4.x-3 — Live Let's Encrypt staging DNS-01 round-trip against a
# real domain. Manual-dispatch by default plus a weekly heartbeat so
# acme-lib + Cloudflare API drift gets caught early.
#
# Activates only when all four secrets are configured on the repo:
#   - LETSENCRYPT_TEST_DOMAIN  : FQDN owned by us with NS pointing at
#     Cloudflare (e.g. `acme-ci.example.com`)
#   - CLOUDFLARE_API_TOKEN     : token scoped to `Zone:DNS:Edit` for
#     the zone serving LETSENCRYPT_TEST_DOMAIN
#   - CLOUDFLARE_ZONE_ID       : Cloudflare zone id for that domain
#   - LETSENCRYPT_CONTACT_EMAIL: ACME registration contact (optional;
#     defaults to ops@example.com if missing)
#
# If any of the first three are missing the job no-ops and emits a
# notice — CI on forks / unconfigured clones stays green.

on:
  workflow_dispatch:
  schedule:
    # Mondays 04:17 UTC — off-peak for Let's Encrypt staging.
    - cron: '17 4 * * 1'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  acme-staging:
    name: cargo test (acme staging round-trip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: gate
        env:
          DOMAIN: ${{ secrets.LETSENCRYPT_TEST_DOMAIN }}
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [[ -z "$DOMAIN" || -z "$TOKEN" || -z "$ZONE" ]]; then
            echo "::notice::ACME staging secrets are not configured on this repo; skipping the round-trip."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.gate.outputs.skip != 'true'

      - uses: Swatinem/rust-cache@v2
        if: steps.gate.outputs.skip != 'true'

      - name: Run staging round-trip
        if: steps.gate.outputs.skip != 'true'
        env:
          LETSENCRYPT_STAGING_ENABLED: '1'
          LETSENCRYPT_TEST_DOMAIN: ${{ secrets.LETSENCRYPT_TEST_DOMAIN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          LETSENCRYPT_CONTACT_EMAIL: ${{ secrets.LETSENCRYPT_CONTACT_EMAIL }}
        run: |
          cargo test -p nexus-infra --test acme_smoke \
            -- --ignored --exact staging_dns01_round_trip
