name: Docker (multi-arch)

# v1.4.8 / v1.4.x-2 (D-V1.4-I).
#
# Tag push (`v*`):  build + push linux/amd64 + linux/arm64 images for
#                   nexus-server + nexus-agent to the configured registry.
# Pull request:     build the same multi-arch images (no push, no
#                   provenance/SBOM) to catch Dockerfile drift and
#                   per-arch cross-compile breakage before release time.
# Workflow dispatch: behaves like a tag push (manual release path).
#
# Operators override `IMAGE_REGISTRY` repo secret to retarget the push
# step; the build-on-PR step always builds locally only.

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'Dockerfile.agent'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/Cargo.toml'
      - '**/*.rs'
      - 'nexus-a2a/proto/**'
      - 'nexus-infra/proto/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ${{ vars.IMAGE_REGISTRY || 'ghcr.io' }}

jobs:
  build-and-push:
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            image_name: nexus-server
          - dockerfile: Dockerfile.agent
            image_name: nexus-agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        run: |
          REF="${GITHUB_REF##*/}"
          REPO="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}"
          if [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            echo "tags=${REPO}:pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${REPO}:${REF},${REPO}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (PR build-only verification — v1.4.x-2)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          load: false
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max

      - name: Build + push multi-arch
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max
