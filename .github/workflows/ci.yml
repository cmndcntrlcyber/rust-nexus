name: CI

# v1.3.8 (Phase 1.3.8). Runs on every PR + push to main. Sibling of
# tauri-build.yml (which is tag-triggered).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude nexus-console --all-targets

  test:
    name: cargo test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude nexus-console --all-targets

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude nexus-console --all-targets -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  mtls-integration:
    name: mTLS integration test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          sudo apt-get update
          sudo apt-get install -y openssl
      - run: ./scripts/gen-certs.sh
      - run: |
          NEXUS_CA_CERT=$(pwd)/certs/ca.crt.pem \
          NEXUS_SERVER_CERT=$(pwd)/certs/server.crt.pem \
          NEXUS_SERVER_KEY=$(pwd)/certs/server.key.pem \
          NEXUS_CLIENT_CERT=$(pwd)/certs/client.crt.pem \
          NEXUS_CLIENT_KEY=$(pwd)/certs/client.key.pem \
          cargo test -p integration-tests --test a2a_mtls -- --ignored

  coverage:
    name: code coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-tarpaulin --locked
      - run: |
          cargo tarpaulin \
            --workspace \
            --exclude nexus-console \
            --out xml \
            --skip-clean
      - uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false

  nightly:
    name: cargo test (nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude nexus-console --all-targets

  bench:
    name: benchmarks
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench -p nexus-common -- --output-format bencher

  wasm-build:
    name: nexus-console UI wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --manifest-path nexus-console/ui/Cargo.toml --target wasm32-unknown-unknown
