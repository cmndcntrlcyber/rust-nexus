name: Security audit

# v1.3.8 (Phase 1.3.8). cargo-audit + cargo-deny on every PR + weekly
# cron. Primary purpose: catch AGPL-license regressions (D-2.1.2-A) and
# known advisory matches.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays 03:17 UTC — off-peak.
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny --locked
      - run: cargo deny check
