syntax = "proto3";

package nexus.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// Main C2 service definition
service NexusC2 {
  // Agent registration and management
  rpc RegisterAgent(RegistrationRequest) returns (RegistrationResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc GetAgentInfo(AgentInfoRequest) returns (AgentInfoResponse);
  
  // Task management
  rpc GetTasks(TaskRequest) returns (stream Task);
  rpc SubmitTaskResult(TaskResult) returns (TaskResultResponse);
  
  // File operations
  rpc UploadFile(stream FileChunk) returns (FileUploadResponse);
  rpc DownloadFile(FileDownloadRequest) returns (stream FileChunk);
  
  // Advanced execution
  rpc ExecuteShellcode(ShellcodeRequest) returns (ShellcodeResponse);
  rpc ExecuteBOF(BOFRequest) returns (BOFResponse);
}

// Agent registration messages
message RegistrationRequest {
  string hostname = 1;
  string os_type = 2;
  string os_version = 3;
  string ip_address = 4;
  string username = 5;
  uint32 process_id = 6;
  string process_name = 7;
  string architecture = 8;
  repeated string capabilities = 9;
  string public_key = 10; // For additional crypto beyond TLS
}

message RegistrationResponse {
  string agent_id = 1;
  bool success = 2;
  string message = 3;
  repeated string assigned_domains = 4; // Fallback C2 domains
  ConfigUpdate config = 5;
}

// Heartbeat messages
message HeartbeatRequest {
  string agent_id = 1;
  SystemStatus status = 2;
  repeated TaskStatus task_statuses = 3;
}

message HeartbeatResponse {
  bool success = 1;
  uint32 heartbeat_interval = 2; // Seconds until next heartbeat
  repeated string new_domains = 3; // Domain rotation
  ConfigUpdate config_update = 4;
}

// System status information
message SystemStatus {
  double cpu_usage = 1;
  uint64 memory_usage_mb = 2;
  uint64 disk_free_mb = 3;
  repeated NetworkInterface interfaces = 4;
  repeated ProcessInfo running_processes = 5;
}

message NetworkInterface {
  string name = 1;
  string ip_address = 2;
  string mac_address = 3;
  string interface_type = 4;
}

message ProcessInfo {
  uint32 pid = 1;
  string name = 2;
  string executable_path = 3;
  string command_line = 4;
  uint64 memory_usage_kb = 5;
  double cpu_usage_percent = 6;
}

// Task management
message TaskRequest {
  string agent_id = 1;
  uint32 max_tasks = 2; // Maximum tasks to return
}

message Task {
  string task_id = 1;
  TaskType task_type = 2;
  string command = 3;
  map<string, string> parameters = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp scheduled_for = 6;
  uint32 timeout_seconds = 7;
  uint32 priority = 8;
  uint32 max_retries = 9;
}

enum TaskType {
  TASK_TYPE_UNSPECIFIED = 0;
  TASK_TYPE_SHELL_COMMAND = 1;
  TASK_TYPE_POWERSHELL_COMMAND = 2;
  TASK_TYPE_FILE_UPLOAD = 3;
  TASK_TYPE_FILE_DOWNLOAD = 4;
  TASK_TYPE_DIRECTORY_LISTING = 5;
  TASK_TYPE_PROCESS_LIST = 6;
  TASK_TYPE_SYSTEM_INFO = 7;
  TASK_TYPE_NETWORK_INFO = 8;
  TASK_TYPE_REGISTRY_QUERY = 9;
  TASK_TYPE_REGISTRY_SET = 10;
  TASK_TYPE_SERVICE_CONTROL = 11;
  // Advanced execution methods
  TASK_TYPE_FIBER_SHELLCODE = 20;
  TASK_TYPE_FIBER_HOLLOWING = 21;
  TASK_TYPE_PROCESS_INJECTION = 22;
  TASK_TYPE_DLL_INJECTION = 23;
  TASK_TYPE_APC_INJECTION = 24;
  TASK_TYPE_EARLY_BIRD_INJECTION = 25;
  TASK_TYPE_BOF_EXECUTION = 26;
  TASK_TYPE_COFF_LOADING = 27;
  // Persistence
  TASK_TYPE_REGISTRY_PERSISTENCE = 30;
  TASK_TYPE_SERVICE_PERSISTENCE = 31;
  TASK_TYPE_TASK_SCHEDULER_PERSISTENCE = 32;
  TASK_TYPE_STARTUP_PERSISTENCE = 33;
  // Reconnaissance
  TASK_TYPE_NETWORK_SCAN = 40;
  TASK_TYPE_CREDENTIAL_HARVESTING = 41;
  TASK_TYPE_BROWSER_DATA_EXTRACTION = 42;
  TASK_TYPE_SCREEN_CAPTURE = 43;
  TASK_TYPE_KEYLOGGER_START = 44;
  TASK_TYPE_KEYLOGGER_STOP = 45;
  // Cleanup
  TASK_TYPE_SELF_DESTRUCT = 50;
  TASK_TYPE_LOG_CLEANING = 51;
  TASK_TYPE_ARTIFACT_REMOVAL = 52;
}

message TaskStatus {
  string task_id = 1;
  TaskExecutionStatus status = 2;
  string message = 3;
  google.protobuf.Timestamp updated_at = 4;
}

enum TaskExecutionStatus {
  TASK_EXECUTION_STATUS_UNSPECIFIED = 0;
  TASK_EXECUTION_STATUS_PENDING = 1;
  TASK_EXECUTION_STATUS_RUNNING = 2;
  TASK_EXECUTION_STATUS_COMPLETED = 3;
  TASK_EXECUTION_STATUS_FAILED = 4;
  TASK_EXECUTION_STATUS_TIMEOUT = 5;
  TASK_EXECUTION_STATUS_CANCELLED = 6;
}

message TaskResult {
  string task_id = 1;
  string agent_id = 2;
  TaskExecutionStatus status = 3;
  string output = 4;
  string error_message = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
  uint64 execution_duration_ms = 8;
  int32 exit_code = 9;
  repeated TaskArtifact artifacts = 10;
}

message TaskResultResponse {
  bool success = 1;
  string message = 2;
}

message TaskArtifact {
  ArtifactType artifact_type = 1;
  string name = 2;
  bytes data = 3;
  map<string, string> metadata = 4;
}

enum ArtifactType {
  ARTIFACT_TYPE_UNSPECIFIED = 0;
  ARTIFACT_TYPE_SCREENSHOT = 1;
  ARTIFACT_TYPE_LOG_FILE = 2;
  ARTIFACT_TYPE_CREDENTIAL_DUMP = 3;
  ARTIFACT_TYPE_PROCESS_DUMP = 4;
  ARTIFACT_TYPE_MEMORY_DUMP = 5;
  ARTIFACT_TYPE_REGISTRY_DUMP = 6;
  ARTIFACT_TYPE_NETWORK_CAPTURE = 7;
  ARTIFACT_TYPE_FILE_CONTENT = 8;
  ARTIFACT_TYPE_CONFIG_DATA = 9;
  ARTIFACT_TYPE_CUSTOM = 10;
}

// File operations
message FileChunk {
  string filename = 1;
  bytes data = 2;
  uint64 offset = 3;
  uint64 total_size = 4;
  string checksum = 5; // SHA256 hash of complete file
}

message FileUploadResponse {
  bool success = 1;
  string message = 2;
  string file_id = 3;
}

message FileDownloadRequest {
  string agent_id = 1;
  string file_path = 2;
  uint64 offset = 3;
  uint32 chunk_size = 4;
}

// Advanced execution
message ShellcodeRequest {
  string agent_id = 1;
  bytes shellcode = 2;
  ShellcodeExecutionMethod method = 3;
  string target_process = 4; // For injection methods
  uint32 target_pid = 5;     // For PID-based injection
  map<string, string> options = 6;
}

enum ShellcodeExecutionMethod {
  SHELLCODE_EXECUTION_METHOD_UNSPECIFIED = 0;
  SHELLCODE_EXECUTION_METHOD_DIRECT_FIBER = 1;
  SHELLCODE_EXECUTION_METHOD_FIBER_HOLLOWING = 2;
  SHELLCODE_EXECUTION_METHOD_EARLY_BIRD = 3;
  SHELLCODE_EXECUTION_METHOD_PROCESS_INJECTION = 4;
  SHELLCODE_EXECUTION_METHOD_APC_INJECTION = 5;
  SHELLCODE_EXECUTION_METHOD_DLL_INJECTION = 6;
}

message ShellcodeResponse {
  bool success = 1;
  string message = 2;
  uint32 process_id = 3; // PID of target process if applicable
}

// BOF (Beacon Object File) execution
message BOFRequest {
  string agent_id = 1;
  bytes bof_data = 2;
  string function_name = 3;
  repeated BOFArgument arguments = 4;
  map<string, string> options = 5;
}

message BOFArgument {
  BOFArgumentType type = 1;
  bytes value = 2;
}

enum BOFArgumentType {
  BOF_ARGUMENT_TYPE_UNSPECIFIED = 0;
  BOF_ARGUMENT_TYPE_INT32 = 1;
  BOF_ARGUMENT_TYPE_INT16 = 2;
  BOF_ARGUMENT_TYPE_STRING = 3;
  BOF_ARGUMENT_TYPE_WSTRING = 4;
  BOF_ARGUMENT_TYPE_BINARY = 5;
}

message BOFResponse {
  bool success = 1;
  string message = 2;
  string output = 3;
}

// Configuration updates
message ConfigUpdate {
  repeated string c2_domains = 1;
  uint32 heartbeat_interval = 2;
  uint32 max_retry_attempts = 3;
  map<string, string> settings = 4;
  CertificateUpdate certificate_update = 5;
}

message CertificateUpdate {
  bytes certificate = 1;
  bytes private_key = 2;
  bytes ca_certificate = 3;
  google.protobuf.Timestamp expires_at = 4;
}

// Agent info request
message AgentInfoRequest {
  string agent_id = 1;
}

message AgentInfoResponse {
  string agent_id = 1;
  RegistrationRequest registration_info = 2;
  google.protobuf.Timestamp last_seen = 3;
  SystemStatus current_status = 4;
  repeated string active_tasks = 5;
  bool is_online = 6;
}

// =============================================================================
// SOC Detection Service
// =============================================================================

// SOC telemetry and detection service
service NexusSOC {
  // Agent registration for detection mode
  rpc RegisterDetectionAgent(DetectionAgentRegistration) returns (DetectionAgentResponse);

  // Telemetry submission from agents
  rpc SubmitTelemetry(TelemetryBatch) returns (TelemetryResponse);
  rpc StreamTelemetry(stream TelemetryEvent) returns (stream TelemetryAck);

  // Detection events
  rpc SubmitDetectionEvent(DetectionEventRequest) returns (DetectionEventResponse);
  rpc GetDetectionEvents(DetectionEventQuery) returns (stream DetectionEventProto);

  // Detection tasks for agents
  rpc GetDetectionTasks(DetectionTaskRequest) returns (stream DetectionTask);
  rpc UpdateDetectionStatus(DetectionStatusUpdate) returns (DetectionStatusResponse);

  // Signature and rule management
  rpc GetSignatureUpdates(SignatureUpdateRequest) returns (SignatureUpdateResponse);
  rpc GetCorrelationRules(CorrelationRuleRequest) returns (CorrelationRuleResponse);

  // Sample submission for sandbox analysis
  rpc SubmitSample(SampleSubmission) returns (SampleSubmissionResponse);
  rpc GetAnalysisResult(AnalysisResultRequest) returns (AnalysisResultResponse);

  // Health and status
  rpc AgentHealthCheck(AgentHealthRequest) returns (AgentHealthResponse);
}

// Detection agent registration
message DetectionAgentRegistration {
  string hostname = 1;
  string os_type = 2;
  string os_version = 3;
  string ip_address = 4;
  string agent_version = 5;
  AgentMode mode = 6;
  repeated DetectionCapability capabilities = 7;
  map<string, string> metadata = 8;
}

enum AgentMode {
  AGENT_MODE_UNSPECIFIED = 0;
  AGENT_MODE_DETECTION = 1;    // EDR-style detection
  AGENT_MODE_MONITOR = 2;      // Passive monitoring only
  AGENT_MODE_RESPONSE = 3;     // Detection + response
  AGENT_MODE_HYBRID = 4;       // Both C2 and detection (for testing)
}

enum DetectionCapability {
  DETECTION_CAPABILITY_UNSPECIFIED = 0;
  DETECTION_CAPABILITY_PROCESS_MONITORING = 1;
  DETECTION_CAPABILITY_NETWORK_MONITORING = 2;
  DETECTION_CAPABILITY_FILE_MONITORING = 3;
  DETECTION_CAPABILITY_REGISTRY_MONITORING = 4;
  DETECTION_CAPABILITY_MEMORY_SCANNING = 5;
  DETECTION_CAPABILITY_BEHAVIORAL_ANALYSIS = 6;
  DETECTION_CAPABILITY_SIGNATURE_SCANNING = 7;
  DETECTION_CAPABILITY_SAMPLE_COLLECTION = 8;
}

message DetectionAgentResponse {
  string agent_id = 1;
  bool success = 2;
  string message = 3;
  DetectionConfig config = 4;
  repeated SignatureSet initial_signatures = 5;
}

// Detection configuration
message DetectionConfig {
  uint32 telemetry_interval_secs = 1;
  uint32 heartbeat_interval_secs = 2;
  repeated string enabled_detectors = 3;
  SeverityLevel min_severity = 4;
  bool enable_sample_collection = 5;
  uint64 max_sample_size_bytes = 6;
  map<string, string> settings = 7;
}

enum SeverityLevel {
  SEVERITY_LEVEL_UNSPECIFIED = 0;
  SEVERITY_LEVEL_INFO = 1;
  SEVERITY_LEVEL_LOW = 2;
  SEVERITY_LEVEL_MEDIUM = 3;
  SEVERITY_LEVEL_HIGH = 4;
  SEVERITY_LEVEL_CRITICAL = 5;
}

// Telemetry messages
message TelemetryBatch {
  string agent_id = 1;
  repeated TelemetryEvent events = 2;
  google.protobuf.Timestamp batch_time = 3;
  uint64 sequence_number = 4;
}

message TelemetryEvent {
  string event_id = 1;
  string agent_id = 2;
  TelemetryType telemetry_type = 3;
  google.protobuf.Timestamp timestamp = 4;
  oneof payload {
    ProcessTelemetry process = 10;
    NetworkTelemetry network = 11;
    FileTelemetry file = 12;
    RegistryTelemetry registry = 13;
    SystemTelemetry system = 14;
  }
  map<string, string> metadata = 20;
}

enum TelemetryType {
  TELEMETRY_TYPE_UNSPECIFIED = 0;
  TELEMETRY_TYPE_PROCESS_CREATE = 1;
  TELEMETRY_TYPE_PROCESS_TERMINATE = 2;
  TELEMETRY_TYPE_NETWORK_CONNECT = 3;
  TELEMETRY_TYPE_NETWORK_LISTEN = 4;
  TELEMETRY_TYPE_NETWORK_DNS = 5;
  TELEMETRY_TYPE_FILE_CREATE = 6;
  TELEMETRY_TYPE_FILE_MODIFY = 7;
  TELEMETRY_TYPE_FILE_DELETE = 8;
  TELEMETRY_TYPE_FILE_READ = 9;
  TELEMETRY_TYPE_REGISTRY_CREATE = 10;
  TELEMETRY_TYPE_REGISTRY_MODIFY = 11;
  TELEMETRY_TYPE_REGISTRY_DELETE = 12;
  TELEMETRY_TYPE_SYSTEM_INFO = 13;
  TELEMETRY_TYPE_MODULE_LOAD = 14;
  TELEMETRY_TYPE_THREAD_CREATE = 15;
}

message ProcessTelemetry {
  uint32 pid = 1;
  uint32 parent_pid = 2;
  string process_name = 3;
  string executable_path = 4;
  string command_line = 5;
  string username = 6;
  uint32 session_id = 7;
  google.protobuf.Timestamp start_time = 8;
  string integrity_level = 9;
  bool is_elevated = 10;
  string file_hash_sha256 = 11;
  string signature_status = 12;
}

message NetworkTelemetry {
  uint32 pid = 1;
  string process_name = 2;
  string local_address = 3;
  uint32 local_port = 4;
  string remote_address = 5;
  uint32 remote_port = 6;
  string protocol = 7;
  ConnectionState state = 8;
  uint64 bytes_sent = 9;
  uint64 bytes_received = 10;
  string dns_query = 11;
  repeated string dns_answers = 12;
}

enum ConnectionState {
  CONNECTION_STATE_UNSPECIFIED = 0;
  CONNECTION_STATE_ESTABLISHED = 1;
  CONNECTION_STATE_LISTEN = 2;
  CONNECTION_STATE_SYN_SENT = 3;
  CONNECTION_STATE_SYN_RECEIVED = 4;
  CONNECTION_STATE_FIN_WAIT = 5;
  CONNECTION_STATE_CLOSE_WAIT = 6;
  CONNECTION_STATE_CLOSED = 7;
}

message FileTelemetry {
  uint32 pid = 1;
  string process_name = 2;
  string file_path = 3;
  FileOperation operation = 4;
  uint64 file_size = 5;
  string file_hash_sha256 = 6;
  google.protobuf.Timestamp modified_time = 7;
  bool is_executable = 8;
  string zone_identifier = 9;
}

enum FileOperation {
  FILE_OPERATION_UNSPECIFIED = 0;
  FILE_OPERATION_CREATE = 1;
  FILE_OPERATION_WRITE = 2;
  FILE_OPERATION_DELETE = 3;
  FILE_OPERATION_RENAME = 4;
  FILE_OPERATION_READ = 5;
  FILE_OPERATION_EXECUTE = 6;
}

message RegistryTelemetry {
  uint32 pid = 1;
  string process_name = 2;
  string key_path = 3;
  string value_name = 4;
  RegistryOperation operation = 5;
  string value_type = 6;
  bytes value_data = 7;
}

enum RegistryOperation {
  REGISTRY_OPERATION_UNSPECIFIED = 0;
  REGISTRY_OPERATION_CREATE_KEY = 1;
  REGISTRY_OPERATION_DELETE_KEY = 2;
  REGISTRY_OPERATION_SET_VALUE = 3;
  REGISTRY_OPERATION_DELETE_VALUE = 4;
  REGISTRY_OPERATION_QUERY_VALUE = 5;
}

message SystemTelemetry {
  double cpu_usage = 1;
  uint64 memory_total_mb = 2;
  uint64 memory_used_mb = 3;
  uint64 disk_total_mb = 4;
  uint64 disk_free_mb = 5;
  uint32 process_count = 6;
  uint32 thread_count = 7;
  uint32 handle_count = 8;
  repeated NetworkInterface network_interfaces = 9;
  repeated LoadedDriver loaded_drivers = 10;
}

message LoadedDriver {
  string name = 1;
  string path = 2;
  string hash_sha256 = 3;
  bool is_signed = 4;
  string signer = 5;
}

message TelemetryResponse {
  bool success = 1;
  uint64 events_received = 2;
  uint64 events_processed = 3;
  repeated string errors = 4;
  uint64 next_sequence = 5;
}

message TelemetryAck {
  string event_id = 1;
  bool acknowledged = 2;
  string error = 3;
}

// Detection events
message DetectionEventRequest {
  string agent_id = 1;
  DetectionEventProto event = 2;
}

message DetectionEventProto {
  string event_id = 1;
  string agent_id = 2;
  DetectionSource source = 3;
  SeverityLevel severity = 4;
  string rule_id = 5;
  string rule_name = 6;
  string description = 7;
  google.protobuf.Timestamp detected_at = 8;
  repeated string mitre_techniques = 9;
  repeated IOCProto iocs = 10;
  map<string, string> context = 11;
  repeated string related_event_ids = 12;
  string raw_data = 13;
}

enum DetectionSource {
  DETECTION_SOURCE_UNSPECIFIED = 0;
  DETECTION_SOURCE_SIGNATURE = 1;
  DETECTION_SOURCE_BEHAVIORAL = 2;
  DETECTION_SOURCE_NETWORK = 3;
  DETECTION_SOURCE_PROCESS = 4;
  DETECTION_SOURCE_SANDBOX = 5;
  DETECTION_SOURCE_CORRELATION = 6;
  DETECTION_SOURCE_THREAT_INTEL = 7;
  DETECTION_SOURCE_YARA = 8;
}

message IOCProto {
  IOCType ioc_type = 1;
  string value = 2;
  string description = 3;
  SeverityLevel severity = 4;
  repeated string tags = 5;
}

enum IOCType {
  IOC_TYPE_UNSPECIFIED = 0;
  IOC_TYPE_IP_ADDRESS = 1;
  IOC_TYPE_DOMAIN = 2;
  IOC_TYPE_URL = 3;
  IOC_TYPE_FILE_HASH_MD5 = 4;
  IOC_TYPE_FILE_HASH_SHA1 = 5;
  IOC_TYPE_FILE_HASH_SHA256 = 6;
  IOC_TYPE_FILE_PATH = 7;
  IOC_TYPE_REGISTRY_KEY = 8;
  IOC_TYPE_PROCESS_NAME = 9;
  IOC_TYPE_MUTEX = 10;
  IOC_TYPE_EMAIL = 11;
}

message DetectionEventResponse {
  bool success = 1;
  string event_id = 2;
  string message = 3;
  repeated ResponseAction recommended_actions = 4;
}

message ResponseAction {
  ResponseActionType action_type = 1;
  string description = 2;
  map<string, string> parameters = 3;
  bool auto_execute = 4;
}

enum ResponseActionType {
  RESPONSE_ACTION_TYPE_UNSPECIFIED = 0;
  RESPONSE_ACTION_TYPE_ALERT = 1;
  RESPONSE_ACTION_TYPE_ISOLATE_HOST = 2;
  RESPONSE_ACTION_TYPE_KILL_PROCESS = 3;
  RESPONSE_ACTION_TYPE_QUARANTINE_FILE = 4;
  RESPONSE_ACTION_TYPE_BLOCK_IP = 5;
  RESPONSE_ACTION_TYPE_BLOCK_DOMAIN = 6;
  RESPONSE_ACTION_TYPE_COLLECT_SAMPLE = 7;
  RESPONSE_ACTION_TYPE_MEMORY_DUMP = 8;
  RESPONSE_ACTION_TYPE_FORENSIC_COLLECTION = 9;
}

message DetectionEventQuery {
  string agent_id = 1;
  SeverityLevel min_severity = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  repeated DetectionSource sources = 5;
  uint32 limit = 6;
}

// Detection tasks
message DetectionTaskRequest {
  string agent_id = 1;
  repeated DetectionCapability capabilities = 2;
}

message DetectionTask {
  string task_id = 1;
  DetectionTaskType task_type = 2;
  map<string, string> parameters = 3;
  uint32 priority = 4;
  google.protobuf.Timestamp expires_at = 5;
}

enum DetectionTaskType {
  DETECTION_TASK_TYPE_UNSPECIFIED = 0;
  DETECTION_TASK_TYPE_SCAN_MEMORY = 1;
  DETECTION_TASK_TYPE_SCAN_FILE = 2;
  DETECTION_TASK_TYPE_SCAN_REGISTRY = 3;
  DETECTION_TASK_TYPE_COLLECT_SAMPLE = 4;
  DETECTION_TASK_TYPE_UPDATE_SIGNATURES = 5;
  DETECTION_TASK_TYPE_THREAT_HUNT = 6;
  DETECTION_TASK_TYPE_IOC_SWEEP = 7;
  DETECTION_TASK_TYPE_BASELINE_UPDATE = 8;
}

message DetectionStatusUpdate {
  string agent_id = 1;
  string task_id = 2;
  DetectionTaskStatus status = 3;
  string message = 4;
  map<string, string> results = 5;
}

enum DetectionTaskStatus {
  DETECTION_TASK_STATUS_UNSPECIFIED = 0;
  DETECTION_TASK_STATUS_PENDING = 1;
  DETECTION_TASK_STATUS_RUNNING = 2;
  DETECTION_TASK_STATUS_COMPLETED = 3;
  DETECTION_TASK_STATUS_FAILED = 4;
}

message DetectionStatusResponse {
  bool success = 1;
  string message = 2;
}

// Signature management
message SignatureUpdateRequest {
  string agent_id = 1;
  string current_version = 2;
  repeated string installed_sets = 3;
}

message SignatureUpdateResponse {
  bool update_available = 1;
  string new_version = 2;
  repeated SignatureSet signature_sets = 3;
}

message SignatureSet {
  string set_id = 1;
  string name = 2;
  string version = 3;
  repeated SignatureRule signatures = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message SignatureRule {
  string rule_id = 1;
  string name = 2;
  string pattern = 3;
  PatternType pattern_type = 4;
  SeverityLevel severity = 5;
  string mitre_technique = 6;
  string description = 7;
  bool enabled = 8;
  repeated string tags = 9;
}

enum PatternType {
  PATTERN_TYPE_UNSPECIFIED = 0;
  PATTERN_TYPE_REGEX = 1;
  PATTERN_TYPE_LITERAL = 2;
  PATTERN_TYPE_YARA = 3;
  PATTERN_TYPE_SIGMA = 4;
}

// Correlation rules
message CorrelationRuleRequest {
  string agent_id = 1;
  string current_version = 2;
}

message CorrelationRuleResponse {
  string version = 1;
  repeated CorrelationRuleProto rules = 2;
}

message CorrelationRuleProto {
  string rule_id = 1;
  string name = 2;
  repeated EventPatternProto patterns = 3;
  uint32 window_seconds = 4;
  SeverityLevel output_severity = 5;
  string description = 6;
  bool enabled = 7;
}

message EventPatternProto {
  DetectionSource source = 1;
  string rule_prefix = 2;
  SeverityLevel min_severity = 3;
}

// Sample submission
message SampleSubmission {
  string agent_id = 1;
  string filename = 2;
  bytes file_content = 3;
  string file_hash_sha256 = 4;
  string source_path = 5;
  SampleReason reason = 6;
  map<string, string> context = 7;
}

enum SampleReason {
  SAMPLE_REASON_UNSPECIFIED = 0;
  SAMPLE_REASON_DETECTION = 1;
  SAMPLE_REASON_SUSPICIOUS = 2;
  SAMPLE_REASON_USER_REQUEST = 3;
  SAMPLE_REASON_THREAT_HUNT = 4;
}

message SampleSubmissionResponse {
  bool success = 1;
  string sample_id = 2;
  string message = 3;
  bool analysis_queued = 4;
}

message AnalysisResultRequest {
  string agent_id = 1;
  string sample_id = 2;
}

message AnalysisResultResponse {
  string sample_id = 1;
  AnalysisStatus status = 2;
  uint32 threat_score = 3;
  string malware_family = 4;
  repeated string signatures_matched = 5;
  repeated IOCProto iocs = 6;
  repeated string mitre_techniques = 7;
  string detailed_report = 8;
}

enum AnalysisStatus {
  ANALYSIS_STATUS_UNSPECIFIED = 0;
  ANALYSIS_STATUS_PENDING = 1;
  ANALYSIS_STATUS_RUNNING = 2;
  ANALYSIS_STATUS_COMPLETE = 3;
  ANALYSIS_STATUS_FAILED = 4;
}

// Health check
message AgentHealthRequest {
  string agent_id = 1;
  AgentMode mode = 2;
  SystemTelemetry system_status = 3;
  repeated string active_detectors = 4;
  uint64 events_generated = 5;
  uint64 events_submitted = 6;
}

message AgentHealthResponse {
  bool success = 1;
  uint32 next_checkin_secs = 2;
  DetectionConfig config_update = 3;
  repeated string messages = 4;
}
