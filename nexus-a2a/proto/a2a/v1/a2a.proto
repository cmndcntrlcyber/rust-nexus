// A2A proto subset for rust-nexus.
//
// v1.3 (this file): partial vendoring of upstream `a2aproject/A2A` v0.3.x.
// v1.3.1 adds the v0.3 RPC surface as Unimplemented stubs:
//
//   - GetTask, CancelTask, TaskSubscription,
//     CreateTaskPushNotificationConfig, ListTask,
//     GetAuthenticatedExtendedAgentCard
//
// Message shapes for the new RPCs are best-effort matches against the
// upstream v0.3 spec; field numbers may differ from a definitive
// upstream sha pin. Full vendoring with the exact upstream proto file
// is a v1.3.x follow-up that needs network access to fetch the
// upstream tag (see `nexus-a2a/VENDORED-VERSION`).
//
// rust-nexus additions on top of the upstream subset:
//
//   - AgentCard.signature (bytes)         — D-V1.2-cards
//   - AgentCard.signer_peer_id (bytes)    — D-V1.2-cards
//
// v1.0-era RPCs (load-bearing for the shell-session skill):
//   - SendStreamingMessage   (bidi — used for shell sessions)
//   - SendMessage            (unary echo — liveness)
//   - GetAgentCard           (server discovery; v1.2 signed by server)
//   - ListRegisteredAgents   (operator-facing agent listing)
//
// v1.3 additions (all return Unimplemented in v1.3 — D-V1.3-A):
//   - GetTask, CancelTask, TaskSubscription,
//     CreateTaskPushNotificationConfig, ListTask,
//     GetAuthenticatedExtendedAgentCard

syntax = "proto3";

package a2a.v1;

message Part {
    oneof part {
        string text = 1;
        bytes file = 2;
    }
}

message Message {
    string message_id = 1;
    string role = 2;
    repeated Part parts = 3;
    string task_id = 4;
}

message AgentCard {
    string name = 1;
    string description = 2;
    string version = 3;
    repeated AgentSkill skills = 4;
    // v1.2 (D-V1.2-cards): Ed25519 signature over the canonical JSON
    // encoding of the unsigned card (everything except `signature` and
    // `signer_peer_id`). Empty bytes = unsigned (accepted only when the
    // loopback gate is on / `accept_unsigned_cards = true`).
    bytes signature = 5;
    // v1.2: 32-byte Ed25519 public key of the signer. The short-form
    // `peer_id` is `BLAKE3(this)` (see [`nexus_common::PeerId`]); we ship
    // the pubkey because verifiers need it directly.
    bytes signer_peer_id = 6;
}

message AgentSkill {
    string id = 1;
    string name = 2;
    string description = 3;
    repeated string tags = 4;
}

enum TaskState {
    TASK_STATE_UNSPECIFIED = 0;
    TASK_STATE_SUBMITTED = 1;
    TASK_STATE_WORKING = 2;
    TASK_STATE_COMPLETED = 3;
    TASK_STATE_FAILED = 4;
    TASK_STATE_CANCELED = 5;
}

message StreamResponse {
    oneof payload {
        Message message = 1;
        TaskStatus task = 2;
    }
}

message TaskStatus {
    string task_id = 1;
    TaskState state = 2;
}

message Empty {}

message RegisteredAgents {
    repeated RegisteredAgent agents = 1;
}

message RegisteredAgent {
    // 32-byte BLAKE3 peer id (in v1.1 the C2 derives this from the agent's
    // overlay-side UUID via BLAKE3(uuid.bytes); see nexus-infra::a2a_lister).
    bytes peer_id = 1;
    string os = 2;
    string version = 3;
    string tag = 4;
    uint64 last_seen_unix = 5;
}

// ---------------------------------------------------------------
// v1.3 additions — upstream A2A v0.3 RPC surface (D-V1.3-A).
//
// All v1.3 server methods for these RPCs return Status::Unimplemented.
// They exist so clients dialing upstream-style endpoints get a clean
// "not implemented yet" response rather than a method-not-found error.
// Full implementations (including the message-level field shapes
// matching the exact upstream tag) are v1.3.x / v1.4 work.
// ---------------------------------------------------------------

message Task {
    string task_id = 1;
    string context_id = 2;
    TaskState state = 3;
}

message GetTaskRequest {
    string task_id = 1;
}

message CancelTaskRequest {
    string task_id = 1;
}

message TaskSubscriptionRequest {
    string task_id = 1;
}

message PushNotificationConfig {
    string task_id = 1;
    string url = 2;
    string token = 3;
}

message CreateTaskPushNotificationConfigRequest {
    PushNotificationConfig config = 1;
}

message ListTaskRequest {
    string context_id = 1;
    uint32 page_size = 2;
    string page_token = 3;
}

message ListTaskResponse {
    repeated Task tasks = 1;
    string next_page_token = 2;
}

// ---------------------------------------------------------------
// v1.4 additions — audit-log streaming + operator tokens.
// ---------------------------------------------------------------

message AuditRecordEvent {
    uint64 timestamp_unix = 1;
    string actor = 2;
    string action = 3;
    string resource = 4;
    string prev_hash = 5;
    string record_hash = 6;
}

message StreamAuditRecordsRequest {
    // Optional filters. Empty string = match all.
    string actor_filter = 1;
    string action_filter = 2;
    // Only stream records with `timestamp_unix >= since_unix`. 0 = no
    // lower bound.
    uint64 since_unix = 3;
}

message IssueOperatorTokenRequest {
    // 16-byte operator identifier (operator's UUID or a hash prefix).
    bytes operator_id = 1;
    // Requested lifetime in seconds. Server may cap to its configured
    // max (`[auth] max_token_lifetime_seconds`).
    uint64 lifetime_seconds = 2;
}

message OperatorTokenReply {
    // Wire-format 97 bytes: see nexus_a2a::tokens::OperatorToken.
    bytes token = 1;
    uint64 issued_unix = 2;
    uint64 expires_unix = 3;
}

service A2aService {
    // v1.0 / v1.2 surface (load-bearing for shell-session).
    rpc SendMessage(Message) returns (Message);
    rpc SendStreamingMessage(stream Message) returns (stream StreamResponse);
    rpc GetAgentCard(Empty) returns (AgentCard);
    rpc ListRegisteredAgents(Empty) returns (RegisteredAgents);

    // v1.3 — Unimplemented stubs (D-V1.3-A). Field numbers and message
    // shapes are best-effort matches against upstream v0.3; v1.4 will
    // re-anchor to a concrete sha pin.
    rpc GetTask(GetTaskRequest) returns (Task);
    rpc CancelTask(CancelTaskRequest) returns (Task);
    rpc TaskSubscription(TaskSubscriptionRequest) returns (stream StreamResponse);
    rpc CreateTaskPushNotificationConfig(CreateTaskPushNotificationConfigRequest) returns (PushNotificationConfig);
    rpc ListTask(ListTaskRequest) returns (ListTaskResponse);
    rpc GetAuthenticatedExtendedAgentCard(Empty) returns (AgentCard);

    // v1.4 — audit-log streaming + operator tokens (D-V1.4-D + Phase 1.4.3).
    rpc StreamAuditRecords(StreamAuditRecordsRequest) returns (stream AuditRecordEvent);
    rpc IssueOperatorToken(IssueOperatorTokenRequest) returns (OperatorTokenReply);
}
